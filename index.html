<style>
:root {
    --bg: #05050a;
    --accent: #00ffff;
    --glow: rgba(0,255,255,0.85);
    --text: #f0ffff;
    --card: rgba(10,20,40,0.8);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    font-size:11px;
    touch-action: manipulation;
}

/* ANIMACIÓN DE BORDE NEÓN QUE SE MUEVE (PUM) */
.neon-border {
    position: relative;
    border: 1px solid transparent;
    background: linear-gradient(var(--bg), var(--bg)) padding-box;
    overflow: hidden;
}
.neon-border::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff, #ff00ff);
    background-size: 300% 300%;
    animation: borderFlow 4s linear infinite;
    border-radius: inherit;
    filter: blur(2px);
    z-index: -1;
}
.neon-border::after {
    content: "";
    position: absolute;
    inset: -1px;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff, #ff00ff);
    background-size: 300% 300%;
    animation: borderFlow 4s linear infinite reverse;
    border-radius: inherit;
    z-index: -1;
}
@keyframes borderFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Resto de animaciones (mismas de antes, pero más ligeras) */
@keyframes glitch { 0% { text-shadow:1.5px 0 #ff00ff,-1.5px 0 #00ffff; } 20% { text-shadow:-1.5px 0 #ff00ff,1.5px 0 #00ffff; transform:translate(-1px,1px); } 40% { text-shadow:1.5px 0 #ff00ff,-1.5px 0 #00ffff; transform:translate(1px,-1px); } 100% { text-shadow:none; transform:translate(0); } }

@keyframes pulseGlow { 0%,100% { box-shadow:0 0 4px var(--glow); } 50% { box-shadow:0 0 18px var(--glow); } }

@keyframes bounceIn { 0% { opacity:0; transform:translateY(8px) scale(0.8); } 60% { opacity:1; transform:translateY(-3px) scale(1.05); } 100% { transform:translateY(0) scale(1); } }

@keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:0.7; } }

@keyframes scan { 0% { transform:translateY(-200%); } 100% { transform:translateY(200%); } }

@keyframes ripple { 0% { transform:scale(0); opacity:0.5; } 100% { transform:scale(3); opacity:0; } }

/* HEADER mini */
.header {
    text-align:center;
    padding:5px 4px 2px;
    font-size:14px;
    letter-spacing:1.2px;
    color:var(--accent);
    font-weight:700;
    animation:glitch 1.8s infinite alternate;
}

/* STATUS mini */
.status {

/* PERFIL ultra mini */
.profile {
    background:var(--card);

    border-radius:7px;
    padding:5px 4px;
    margin:6px 0;
    text-align:center;
    position:relative;
    overflow:hidden;
}
.profile::before {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(transparent,rgba(0,255,255,0.18),transparent);
    animation:scan 6s linear infinite;
}
.avatar {
    width:38px;
    height:38px;
    border-radius:50%;
    border:1.5px solid var(--accent);
    box-shadow:0 0 10px var(--glow);
    margin-bottom:3px;
    animation:pulseGlow 2.5s infinite;
}
.badges {
    font-size:8px;
    line-height:1.2;
    opacity:0.9;
}

/* OFERTA mini */
.oferta {
    background:rgba(255,60,60,0.35);

    padding:5px;
    border-radius:6px;
    margin:6px 0;
    font-size:10px;
    font-weight:600;

    animation:flicker 3s infinite, pulseGlow 5s infinite;
}

/* UPDATE mini */
.update {
    text-align:center;
    font-size:8px;
    color:#00ff99;
    margin:3px 0 6px;
    opacity:0.8;
    animation:flicker 5s infinite;
}

/* BOTONES ultra mini */
.link {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    padding:6px 10px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid rgba(0,255,255,0.65);
    color:var(--text);
    font-size:11px;
    font-weight:600;
    text-decoration:none;
    position:relative;
    overflow:hidden;
    animation:bounceIn 0.5s forwards;
}
.link::after {
    content:"";
    position:absolute;
    top:50%; left:50%;
    width:0; height:0;
    background:rgba(0,255,255,0.4);
    border-radius:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
}
.link:active::after {
    width:140px; height:140px;
    animation:ripple 0.5s linear;
}
.link:hover {
    transform:scale(1.06) translateY(-1px);
    box-shadow:0 0 18px var(--glow);
    background:rgba(0,255,255,0.2);
}
.link:active {
    transform:scale(0.94);
}
.link span.icon { font-size:11px; animation:pulseGlow 3s infinite; }

/* COLAB mini */
.collab {
    background:var(--card);
    border:1px solid rgba(0,255,255,0.5);
    border-radius:7px;
    padding:5px;
    margin:8px 0 4px;
    text-align:center;
}
.collab-avatar {

    height:30px;
    border-radius:50%;

    box-shadow:0 0 8px var(--glow);

/* NUEVAS COSITAS ABAJO */

/* FLOATS mini */

.whatsapp-float:hover, .copy-float:hover { transform:scale(1.18); }

/* CANVAS + lluvia y partículas mini */
canvas { position:fixed; top:0; left:0; z-index:-1; }

<script>
// Canvas ultra ligero + lluvia digital
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rainDrops = [];
for(let i = 0; i < 30; i++){
    rainDrops.push({
        x: Math.random()*canvas.width,
        y: Math.random()*-canvas.height,
        length: Math.random()*12 + 6,
        speed: Math.random()*2.5 + 1,
        opacity: Math.random()*0.2 + 0.04
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    rainDrops.forEach(r => {
        ctx.strokeStyle = `rgba(0,255,255,${r.opacity})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x, r.y + r.length);
        ctx.stroke();

        r.y += r.speed;
        if(r.y > canvas.height) {
            r.y = -r.length;
            r.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Vibración mini
document.querySelectorAll('.link').forEach(link => {
    link.addEventListener('touchstart', () => {
        if(navigator.vibrate) navigator.vibrate(20);
    });
});
</script>
