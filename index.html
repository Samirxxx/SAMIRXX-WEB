<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samirxx</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  text-align: center;
  color: white;
  overflow-x: hidden;
}

/* PARTÍCULAS */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(red 1px, transparent 1px);
  background-size: 30px 30px;
  animation: move 10s linear infinite;
  opacity: 0.3;
}

@keyframes move {
  from {transform: translateY(0);}
  to {transform: translateY(100px);}
}

/* IMÁGENES */
img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid red;
  margin-top: 20px;
  box-shadow: 0 0 20px red;
}

/* TEXTO */
h1 {
  color: red;
  text-shadow: 0 0 10px red;
}

/* BOTONES */
.btn {
  display: block;
  background: red;
  color: white;
  padding: 15px;
  margin: 10px auto;
  width: 80%;
  border-radius: 12px;
  text-decoration: none;
  box-shadow: 0 0 15px red;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px red;
}
</style>

</head>

</html>
