<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modificación XIT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#05060a;
  color:white;
  overflow:hidden;
}

/* FONDO */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* CONTENEDOR */
.container{
  width:85%;
  max-width:240px;
  margin:auto;
  text-align:center;
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:100vh;
}

/* LÍNEA ANIMADA */
.line{
  height:2px;
  width:0%;
  background:#00bfff;
  margin:0 auto 15px;
  animation:lineGrow 1.2s ease forwards;
}

/* TITULO */
.title{
  font-size:16px;
  letter-spacing:1px;
  color:#00bfff;
  position:relative;
  margin-bottom:10px;
}

/* EFECTO SCAN */
.title::after{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(0,191,255,0.6), transparent);
  animation:scan 2s infinite;
}

/* SUB */
.subtitle{
  font-size:11px;
  color:#7fbfff;
  margin-bottom:20px;
}

/* BOTÓN */
.link{
  display:block;
  background:rgba(0,191,255,0.1);
  border:1px solid #00bfff;
  padding:7px;
  border-radius:8px;
  text-decoration:none;
  color:#00bfff;
  font-size:11px;
  backdrop-filter:blur(5px);
  transition:0.3s;
}

.link:active{
  transform:scale(0.95);
  box-shadow:0 0 10px #00bfff;
}

/* ANIMACIONES */
@keyframes lineGrow{
  from{width:0;}
  to{width:60%;}
}

@keyframes scan{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

  <div class="line"></div>

  <div class="title">MODIFICACIÓN XIT</div>
  <div class="subtitle">Sistema en preparación</div>

  <a class="link" href="index.html">⬅️ Regresar</a>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

/* PARTÍCULAS AZULES DIFERENTES */
const particles=[];
for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.5,
    dx:(Math.random()-0.5)*0.2,
    dy:Math.random()*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,191,255,0.5)';
    ctx.fill();

    if(p.y>canvas.height)p.y=0;
    if(p.x>canvas.width)p.x=0;
    if(p.x<0)p.x=canvas.width;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
